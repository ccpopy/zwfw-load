name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-22.04
            args: ""
            rust-target: ""
          - label: windows-x64
            os: windows-latest
            args: ""
            rust-target: ""
          - label: macos-aarch64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - label: macos-x64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: zwfw-load ${{ github.ref_name }}
          releaseBody: |
            ## Changes

            - 精简关于弹窗的更新区域，移除冗余说明、路径明细和状态明细。
            - 将关于弹窗中的运行信息标签改为中文展示，提升界面一致性。
            - 修复 Windows 便携版更新文件名，直接使用 GitHub Release 原始 portable exe 文件名，不再生成 .update.exe。
            - 修复 Windows 便携版更新后无法直接启动新版本的问题。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          assetNamePattern: zwfw-load_${{ steps.package-version.outputs.version }}_[platform]_[arch][setup][ext]

      - name: Upload Windows portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          $portable = "src-tauri/target/release/zwfw-load-tauri.exe"
          if (-not (Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }
          $asset = "zwfw-load_${env:PACKAGE_VERSION}_x64-portable.exe"
          Copy-Item -Path $portable -Destination $asset -Force
          gh release upload $env:RELEASE_TAG $asset --clobber
