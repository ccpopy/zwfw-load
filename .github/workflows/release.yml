name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        required: true
        default: "v26.06.08"
      target:
        description: "Build target"
        required: true
        type: choice
        default: "windows-x64"
        options:
          - all
          - windows-x64
          - linux-x64
          - macos-aarch64
          - macos-x64

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve build target
        id: matrix
        shell: bash
        env:
          TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
        run: |
          case "$TARGET" in
            all)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""},{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""},{"label":"macos-aarch64","os":"macos-latest","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"},{"label":"macos-x64","os":"macos-latest","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            linux-x64)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            windows-x64)
              echo 'matrix={"include":[{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-aarch64)
              echo 'matrix={"include":[{"label":"macos-aarch64","os":"macos-latest","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-x64)
              echo 'matrix={"include":[{"label":"macos-x64","os":"macos-latest","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported build target: $TARGET" >&2
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: zwfw-load ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## Changes

            ### 新增

            - 重新设计应用图标，采用更接近 macOS/iOS 主流应用图标的圆角渐变、玻璃层次和简洁分流符号。
            - 同步生成 Windows、macOS、Linux、iOS 和 Android 所需的 Tauri 图标资源。

            ### 调整

            - 优化输入框和下拉选择框的 hover/focus 视觉状态，减少突兀阴影和背景跳变。
            - 将代理编辑弹窗的测试地址选择入口整合进输入框内部，交互形态更接近标准 combobox。
            - 发布包版本、产物命名和 Windows 安装包内部应用版本统一使用 `26.6.8`。

            ### 修复

            - 修复代理编辑弹窗中测试地址候选列表偏离输入框的问题，下拉现在从输入框正下方展开并与输入框等宽。

            ### 文档

            - 更新 README 中 Windows portable、Windows 安装包和 macOS dmg 的示例文件名。
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          assetNamePattern: zwfw-load_${{ steps.package-version.outputs.version }}_[platform]_[arch][setup][ext]

      - name: Upload Windows portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          $portable = "src-tauri/target/release/zwfw-load-tauri.exe"
          if (-not (Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }
          $asset = "zwfw-load_${env:PACKAGE_VERSION}_x64-portable.exe"
          Copy-Item -Path $portable -Destination $asset -Force
          gh release upload $env:RELEASE_TAG $asset --clobber
