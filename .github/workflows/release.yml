name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-22.04
            args: ""
            rust-target: ""
          - label: windows-x64
            os: windows-latest
            args: ""
            rust-target: ""
          - label: macos-aarch64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - label: macos-x64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: zwfw-load ${{ github.ref_name }}
          releaseBody: |
            ## Changes

            ### 新增

            - 重新设计应用图标，采用更接近 macOS/iOS 主流应用图标的圆角渐变、玻璃层次和简洁分流符号。
            - 同步生成 Windows、macOS、Linux、iOS 和 Android 所需的 Tauri 图标资源。

            ### 调整

            - 优化输入框和下拉选择框的 hover/focus 视觉状态，减少突兀阴影和背景跳变。
            - 将代理编辑弹窗的测试地址选择入口整合进输入框内部，交互形态更接近标准 combobox。
            - 统一前端包、Rust 后端、Tauri 配置和发布产物命名使用日期版本 `2026.6.5`。

            ### 修复

            - 修复代理编辑弹窗中测试地址候选列表偏离输入框的问题，下拉现在从输入框正下方展开并与输入框等宽。

            ### 文档

            - 更新 README 中 Windows portable、Windows 安装包和 macOS dmg 的示例文件名。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          assetNamePattern: zwfw-load_${{ steps.package-version.outputs.version }}_[platform]_[arch][setup][ext]

      - name: Upload Windows portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          $portable = "src-tauri/target/release/zwfw-load-tauri.exe"
          if (-not (Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }
          $asset = "zwfw-load_${env:PACKAGE_VERSION}_x64-portable.exe"
          Copy-Item -Path $portable -Destination $asset -Force
          gh release upload $env:RELEASE_TAG $asset --clobber
